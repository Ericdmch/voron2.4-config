[include hardware/sb2209-usb-stealthburner.cfg]
# [include hardware/eddy-coil-i2c.cfg]
[include eddy-ng.cfg]
[include hardware/fans.cfg]
[include hardware/leds.cfg]

[include macros/base.cfg]
[include macros/print.cfg]
[include macros/leds.cfg]
[include macros/nevermore.cfg]
