[gcode_macro LOAD_FILAMENT]
description: Heat and load filament
gcode:
  {% set temp = params.TEMP|default(230)|float %}
  PARK_FRONT
  M109 S{temp}
  M83
  G1 E50 F300
  G1 E50 F300
  G1 E20 F180
  M400

[gcode_macro UNLOAD_FILAMENT]
description: Heat and unload filament
gcode:
  {% set temp = params.TEMP|default(230)|float %}
  PARK_FRONT
  M109 S{temp}
  M83
  G1 E10 F300
  G1 E-8 F2400
  G4 P300
  G1 E-70 F600
  M400

[gcode_macro M600]
description: Filament change
gcode:
  PAUSE
  PARK_FRONT
