[gcode_macro CHOME]
description: Home all axes only if needed
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32

    G90
    G28
    QUAD_GANTRY_LEVEL
    G28 Z

    G0 X175 Y153.58 Z10 F12000

    RESTORE_GCODE_STATE NAME=STATE_G32

[gcode_macro PARK_CENTER]
description: Park at bed center
gcode:
  CHOME
  G90
  G1 X175 Y175 Z30 F6000

[gcode_macro PARK_FRONT]
description: Park at the front for service
gcode:
  CHOME
  G90
  G1 X175 Y10 Z80 F6000

[gcode_macro PARK_REAR]
description: Park near the rear
gcode:
  CHOME
  G90
  G1 X175 Y345 Z30 F6000

[gcode_macro PAUSE]
description: Pause the active print, retract, and park at the front
rename_existing: PAUSE_BASE
gcode:
  {% set retract = params.E|default(1.0)|float %}
  {% set z_lift = params.Z|default(10.0)|float %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set current_z = printer.toolhead.position.z|float %}
  {% set safe_z = [z_lift, max_z - current_z]|min %}
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == "true" %}
    G1 E-{retract} F2100
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{safe_z} F900
    G90
    G1 X175 Y10 F6000
  {% endif %}

[gcode_macro RESUME]
description: Restore the paused print position and continue
rename_existing: RESUME_BASE
gcode:
  {% set retract = params.E|default(1.0)|float %}
  {% if printer.extruder.can_extrude|lower == "true" %}
    G91
    G1 E{retract} F2100
    G90
  {% endif %}
  RESUME_BASE

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  M107
  NEVERMORE_OFF
  BED_MESH_CLEAR
  CANCEL_PRINT_BASE

[gcode_macro CALIBRATE_INPUT_SHAPER]
description: Home, calibrate CoreXY input shaping, and save the results
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  G90
  G1 X175 Y175 Z20 F6000
  SHAPER_CALIBRATE
  SAVE_CONFIG

[gcode_macro CLEAN_NOZZLE_PARK]
description: Home if needed and park the nozzle above the A1 wiper
gcode:
  CHOME
  _CLEAN_NOZZLE_PARK

[gcode_macro _CLEAN_NOZZLE_PARK]
gcode:
  {% set clean = printer["gcode_macro CLEAN_NOZZLE"] %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set current_z = printer.toolhead.position.z|float %}
  {% set z_lift = [[clean.raise_distance|float, max_z - current_z]|min, 0.0]|max %}
  SAVE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE_PARK
  SB_BUSY
  G91
  G1 Z{z_lift} F900
  G90
  G1 X{clean.park_x} Y{clean.start_y} F6000
  G1 Z{clean.start_z} F900
  SB_READY
  RESTORE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE_PARK MOVE=0

[gcode_macro CLEAN_NOZZLE]
description: Scrub the nozzle across the Bambu Lab A1 wiper
variable_park_x:    84.0
variable_start_x:   85
variable_start_y:   347.50
variable_start_z:   -0.600
variable_wipe_dist: 35
variable_wipe_qty:  10
variable_wipe_spd:  200
variable_raise_distance: 5
gcode:
  CHOME
  _CLEAN_NOZZLE

[gcode_macro _CLEAN_NOZZLE]
gcode:
  {% set clean = printer["gcode_macro CLEAN_NOZZLE"] %}
  {% set start_x = clean.start_x|float %}
  {% set start_y = clean.start_y|float %}
  {% set start_z = clean.start_z|float %}
  {% set end_x = start_x + clean.wipe_dist|float %}
  {% set wipe_qty = clean.wipe_qty|int %}
  {% set wipe_feed = clean.wipe_spd|float * 60 %}
  {% set raise_distance = clean.raise_distance|float %}
  {% set min_x = printer.toolhead.axis_minimum.x|float %}
  {% set max_x = printer.toolhead.axis_maximum.x|float %}
  {% set min_y = printer.toolhead.axis_minimum.y|float %}
  {% set max_y = printer.toolhead.axis_maximum.y|float %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set current_z = printer.toolhead.position.z|float %}
  {% set z_lift = [[raise_distance, max_z - current_z]|min, 0.0]|max %}

  {% if start_x < min_x or start_x > max_x or end_x < min_x or end_x > max_x %}
    {action_raise_error("A1 wiper X coordinates exceed the configured travel limits")}
  {% endif %}
  {% if start_y < min_y or start_y > max_y %}
    {action_raise_error("A1 wiper Y coordinate exceeds the configured travel limits")}
  {% endif %}

  SAVE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE
  SB_BUSY

  # Lift before travelling to the front-mounted wiper.
  G91
  G1 Z{z_lift} F900
  G90
  G1 X{start_x} Y{start_y} F6000
  G1 Z{start_z} F900

  # Scrub back and forth without pausing at either end.
  {% for wipe in range(wipe_qty) %}
    G1 X{end_x} F{wipe_feed}
    G1 X{start_x} F{wipe_feed}
  {% endfor %}

  # Move off the wiper and raise the nozzle.
  G1 X{start_x + 6} Z{start_z + raise_distance} F6000
  SB_READY
  RESTORE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE MOVE=0