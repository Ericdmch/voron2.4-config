[gcode_macro PRINT_START]
description: PRINT_START BED=60 EXTRUDER=220
gcode:
  SB_Heating 
  {% set bed = params.BED|default(params.BED_TEMP|default(60))|float %}
  {% set extruder = params.EXTRUDER|default(params.EXTRUDER_TEMP|default(220))|float %}
  {% set chamber = params.CHAMBER|default(0)|float %}
  CLEAR_PAUSE
  BED_MESH_CLEAR
  CASELIGHT_ON BRIGHTNESS=1
  SB_BUSY
  NEVERMORE_ON SPEED=0.75
  M140 S{bed}
  M104 S150
  G32
  M190 S{bed}
  {% if chamber > 0 %}
    TEMPERATURE_WAIT SENSOR="heater_bed" MINIMUM={bed * 0.95}
  {% endif %}
  BED_MESH_CLEAR
  BED_MESH_SCAN
  CLEAN_NOZZLE_PARK
  M109 S{extruder}
  CLEAN_NOZZLE
  SB_READY

[gcode_macro PRINT_END]
description: End print, park, and cool down
gcode:
  {% set th = printer.toolhead %}
  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 10, th.axis_maximum.z]|min %}
  SAVE_GCODE_STATE NAME=STATE_PRINT_END
  M400
  G92 E0
  G1 E-3 F1800
  TURN_OFF_HEATERS
  G90
  G0 X{x_safe} Y{y_safe} Z{z_safe} F12000
  G0 X175 Y345 F6000
  M107
  BED_MESH_CLEAR
  NEVERMORE_ON SPEED=0.35
  UPDATE_DELAYED_GCODE ID=nevermore_shutdown DURATION=900
  SB_OFF
  RESTORE_GCODE_STATE NAME=STATE_PRINT_END

[delayed_gcode nevermore_shutdown]
gcode:
  NEVERMORE_OFF
