[gcode_macro CASELIGHT_ON]
description: Set case Neopixels, optional BRIGHTNESS=0.0-1.0
gcode:
  {% set brightness = params.BRIGHTNESS|default(0.70)|float %}
  SET_LED LED=case_lights RED={brightness} GREEN={brightness} BLUE={brightness}

[gcode_macro CASELIGHT_OFF]
description: Turn off case Neopixels
gcode:
  SET_LED LED=case_lights RED=0 GREEN=0 BLUE=0

[gcode_macro CASELIGHT_DIM]
description: Dim case Neopixels
gcode:
  CASELIGHT_ON BRIGHTNESS=0.20

[gcode_macro SB_READY]
gcode:
  SET_LED LED=sb_leds RED=1 GREEN=1 BLUE=1 WHITE=1 INDEX=1 TRANSMIT=0
  SET_LED LED=sb_leds RED=1 GREEN=1 BLUE=1 WHITE=1 INDEX=2 TRANSMIT=0
  SET_LED LED=sb_leds RED=1 GREEN=1 BLUE=1 WHITE=1 INDEX=3

[gcode_macro SB_BUSY]
gcode:
  SET_LED LED=sb_leds RED=1 GREEN=0 BLUE=1 WHITE=0.00 INDEX=1 TRANSMIT=0
  SET_LED LED=sb_leds RED=1 GREEN=0 BLUE=1 WHITE=0.35 INDEX=2 TRANSMIT=0
  SET_LED LED=sb_leds RED=1 GREEN=0 BLUE=1 WHITE=0.35 INDEX=3

[gcode_macro SB_OFF]
gcode:
  SET_LED LED=sb_leds RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=1 TRANSMIT=0
  SET_LED LED=sb_leds RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=2 TRANSMIT=0
  SET_LED LED=sb_leds RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=3

[gcode_macro SB_Heating]
gcode:
  SET_LED LED=sb_leds RED=1 GREEN=0.7 BLUE=0 WHITE=0 INDEX=1 TRANSMIT=0
  SET_LED LED=sb_leds RED=1 GREEN=0.7 BLUE=0 WHITE=0 INDEX=2 TRANSMIT=0
  SET_LED LED=sb_leds RED=1 GREEN=0.7 BLUE=0 WHITE=0 INDEX=3