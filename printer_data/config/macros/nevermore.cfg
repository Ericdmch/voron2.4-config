[gcode_macro NEVERMORE_ON]
description: Turn on Nevermore filter, optional SPEED=0.0-1.0
gcode:
  {% set speed = params.SPEED|default(1.0)|float %}
  SET_FAN_SPEED FAN=nevermore SPEED={speed}

[gcode_macro NEVERMORE_OFF]
description: Turn off Nevermore filter
gcode:
  SET_FAN_SPEED FAN=nevermore SPEED=0

[gcode_macro NEVERMORE_TOGGLE]
description: Toggle Nevermore between off and full speed
gcode:
  {% set speed = printer["fan_generic nevermore"].speed|float %}
  {% if speed > 0 %}
    NEVERMORE_OFF
  {% else %}
    NEVERMORE_ON SPEED=1.0
  {% endif %}
