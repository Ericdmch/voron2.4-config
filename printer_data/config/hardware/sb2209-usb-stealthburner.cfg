# BIGTREETECH EBB SB2209 USB toolhead board for Stealthburner/CW2.
# Pin map follows BTT's sample-bigtreetech-ebb-sb-usb-v1.0.cfg.

[mcu toolhead]
# Replace with the SB2209 USB serial from:
#   ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-Klipper_rp2040_504434041074241C-if00
restart_method: command

[temperature_sensor sb2209_mcu]
sensor_type: Generic 3950
sensor_pin: toolhead:gpio27
min_temp: 0
max_temp: 100

#####################################################################
# Extruder and Bambu Lab hotend
#####################################################################

[extruder]
step_pin: toolhead:gpio18
dir_pin: toolhead:gpio19
enable_pin: !toolhead:gpio17
microsteps: 16
rotation_distance: 22.6789511
gear_ratio: 50:10
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: toolhead:gpio7
sensor_type: Generic 3950
sensor_pin: toolhead:gpio26
pullup_resistor: 2200
min_temp: 10
max_temp: 300
max_power: 0.65
min_extrude_temp: 200
control: pid
# pid_Kp: 21.527
# pid_Ki: 1.063
# pid_Kd: 108.982

[tmc2209 extruder]
uart_pin: toolhead:gpio20
run_current: 0.55
interpolate: false
stealthchop_threshold: 0

#####################################################################
# Toolhead fans
#####################################################################

[fan]
# Stealthburner part cooling blower, SB2209 fan1
pin: toolhead:gpio14
kick_start_time: 0.5
off_below: 0.10

[heater_fan hotend_fan]
# Hotend heatsink fan, SB2209 fan2
pin: toolhead:gpio4
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

#####################################################################
# Toolhead LEDs and accelerometer
#####################################################################

[neopixel sb_leds]
pin: toolhead:gpio15
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[output_pin toolhead_activity_led]
pin: toolhead:gpio24
value: 0
shutdown_value: 0

[lis2dw toolhead]
cs_pin: toolhead:gpio1
spi_bus: spi0a
axes_map: z,x,y

[resonance_tester]
accel_chip: lis2dw toolhead
probe_points:
    175,175,20
