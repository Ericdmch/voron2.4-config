# LDO Voron Leviathan mainboard, Voron 2.4 350 motion/bed wiring.
# Baseline pin map follows LDO's Rev.D Voron 2.4 Leviathan config.

[mcu]
# Replace with the Leviathan USB serial from:
#   ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_290036000751303532383235-if00
restart_method: command

#####################################################################
# XY steppers - physical X/Y endstops
#####################################################################

# B motor, left gantry, HV STEPPER 0, X-ENDSTOP
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 400
endstop_pin: PC1
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 25
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075
#stealthchop_threshold: 0

# A motor, right gantry, HV STEPPER 1, Y-ENDSTOP
[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 400
endstop_pin: PC2
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 25
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075
#stealthchop_threshold: 0

#####################################################################
# Z steppers - dedicated physical rear Z endstop
#####################################################################

# Z0, front left, STEPPER 0, Z-ENDSTOP
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
# Home Z with the stock nozzle switch instead of Eddy NG.  Recent Klipper
# probe-session changes cause a circular dependency when Eddy NG is both the
# Z endstop and the probe: Eddy refuses to probe until Z has been homed.
endstop_pin: PC3
position_endstop: -0.5
position_max: 310
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PD5
interpolate: true
run_current: 0.75
sense_resistor: 0.110
#stealthchop_threshold: 999999

# Z1, rear left, STEPPER 1
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PD0
interpolate: true
run_current: 0.75
sense_resistor: 0.110
#stealthchop_threshold: 999999

# Z2, rear right, STEPPER 2
[stepper_z2]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PA8
interpolate: true
run_current: 0.75
sense_resistor: 0.110
#stealthchop_threshold: 999999

# Z3, front right, STEPPER 3
[stepper_z3]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PG8
interpolate: true
run_current: 0.75
sense_resistor: 0.110
#stealthchop_threshold: 999999


#####################################################################
# Bed heater
#####################################################################

[heater_bed]
heater_pin: PG10
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
pullup_resistor: 2200
max_power: 0.8
min_temp: 0
max_temp: 120
control: pid
pid_Kp: 46.526 
pid_Ki: 1.520
pid_Kd: 355.921


#####################################################################
# Homing and quad gantry level
#####################################################################

[safe_z_home]
# Stock rear nozzle-switch position for the LDO Voron 2.4 350. Verify the
# nozzle is directly above the switch before the first Z-home.
home_xy_position: 234,350
speed: 100
z_hop: 10
z_hop_speed: 25

[quad_gantry_level]
gantry_corners:
    -60,-10
    410,420

points:
    40,40
    40,300
    310,300
    310,40

speed: 100
horizontal_move_z: 5
retries: 10
retry_tolerance: 0.015
max_adjust: 10

[bed_mesh]
speed: 250
horizontal_move_z: 2
mesh_min: 30,30
mesh_max: 320,315
probe_count: 50,50
algorithm: bicubic
scan_overshoot: 8
fade_start: 0.6
fade_end: 10.0

#####################################################################
# EXP1 / EXP2 aliases for future display or expansion hardware.
#####################################################################

[board_pins]
aliases:
    EXP1_1=PG9, EXP1_2=PG12,
    EXP1_3=PG13, EXP1_4=PG14,
    EXP1_5=PC13, EXP1_6=PC14,
    EXP1_7=PC15, EXP1_8=PF0,
    EXP1_9=<GND>, EXP1_10=<5V>,
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PE2, EXP2_4=PE4,
    EXP2_5=PE3, EXP2_6=PA7,
    EXP2_7=PE5, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PE4
