# Chassis, electronics, and Nevermore fan outputs.

[multi_pin electronics_fan_pins]
# Four electronics bay cooling fans split across two Leviathan fan connectors.
pins: PB7, PB3

[controller_fan electronics_bay]
pin: multi_pin:electronics_fan_pins
fan_speed: 0.6
idle_timeout: 120
idle_speed: 0.0
kick_start_time: 0.5

[fan_generic nevermore]
# Uses the Leviathan LED-STRIP MOSFET output. If your Nevermore is wired to a
# different 24V fan/MOSFET output, change this pin before enabling the fan.
pin: PF9
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.8
off_below: 0.15
cycle_time: 0.010
