[probe_eddy_ng btt_eddy]
sensor_type: ldc1612

# BTT Eddy Coil connected to the SB2209 USB I2C port
i2c_mcu: toolhead
i2c_bus: i2c0h

x_offset: 0
y_offset: 21.42

probe_speed: 5
lift_speed: 10
move_speed: 100

home_trigger_height: 2.0
calibration_z_max: 15.0

# Recommended starting point for BTT Eddy Coil
reg_drive_current: 15
tap_drive_current: 16